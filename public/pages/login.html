<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GAN — Acceder</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/main.css">
  <style>
    body { display: flex; flex-direction: column; min-height: 100vh; background: var(--color-bg); }
    .login-wrap {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }
    .login-card {
      background: #fff;
      border: 1px solid var(--color-border);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-md);
      width: 100%;
      max-width: 420px;
      padding: 2.5rem;
    }
    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .login-logo a {
      font-size: 1.6rem;
      font-weight: 800;
      color: var(--color-text);
      text-decoration: none;
    }
    .login-logo a span { color: var(--color-primary); }
    .login-logo p {
      color: var(--color-text-muted);
      font-size: .875rem;
      margin-top: .35rem;
    }
    .otp-digits {
      display: flex;
      gap: .5rem;
      justify-content: center;
      margin: 1.25rem 0;
    }
    .otp-digits input {
      width: 48px;
      height: 56px;
      text-align: center;
      font-size: 1.5rem;
      font-weight: 700;
      border: 2px solid var(--color-border);
      border-radius: var(--radius);
      outline: none;
      transition: border-color var(--transition);
    }
    .otp-digits input:focus { border-color: var(--color-primary); }
  </style>
  <script>
    window.__GAN_CONFIG__ = {
      supabaseUrl:  'https://szevodmqxuxljfelorcu.supabase.co',
      supabaseAnon: 'sb_publishable_Se492A4JupPSQVxtdQKfSQ_CUnx1DXX'
    };
  </script>
</head>
<body>

<nav class="navbar">
  <div class="navbar-inner">
    <a href="/" class="navbar-brand">GAN <span>System</span></a>
    <div class="lang-switcher" style="margin-left:auto;">
      <button data-lang-btn="es">ES</button>
      <button data-lang-btn="en">EN</button>
      <button data-lang-btn="pt">PT</button>
      <button data-lang-btn="fr">FR</button>
    </div>
  </div>
</nav>

<div class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <a href="/"><span>GAN</span> System</a>
      <p>Acceder a GAN Platform</p>
    </div>

    <!-- PASO 1: Email -->
    <div id="step-email">
      <div class="form-group">
        <label class="form-label">Correo electrónico</label>
        <input type="email" id="email" class="form-input" placeholder="tu@universidad.edu" autocomplete="email">
      </div>
      <div id="email-error" style="display:none;color:var(--color-danger);font-size:.85rem;margin-bottom:.75rem;"></div>
      <button id="send-btn" class="btn btn-primary" style="width:100%;justify-content:center;" onclick="sendCode()">
        Enviar código
      </button>
      <p style="text-align:center;font-size:.85rem;margin-top:1rem;color:var(--color-text-muted);">
        ¿No eres miembro? <a href="/pages/postulacion.html">Postular</a>
      </p>
    </div>

    <!-- PASO 2: Código OTP -->
    <div id="step-otp" style="display:none;">
      <p style="font-size:.875rem;color:var(--color-text-muted);margin-bottom:1.25rem;text-align:center;">
        Enviamos un código de 6 dígitos a <strong id="email-display"></strong>
      </p>
      <div class="otp-digits">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-input">
        <input type="text" maxlength="1" inputmode="numeric" class="otp-input">
      </div>
      <div id="otp-error" style="display:none;color:var(--color-danger);font-size:.85rem;margin-bottom:.75rem;text-align:center;"></div>
      <button id="verify-btn" class="btn btn-primary" style="width:100%;justify-content:center;" onclick="verifyCode()">
        Verificar e ingresar
      </button>
      <p style="text-align:center;font-size:.85rem;margin-top:1rem;">
        <a href="#" onclick="backToEmail()">← Cambiar correo</a>
        &nbsp;·&nbsp;
        <a href="#" onclick="sendCode(true)">Reenviar código</a>
      </p>
    </div>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="/js/i18n.js"></script>
<script src="/js/supabase-client.js"></script>
<script>
let currentEmail = '';

(async () => {
  const session = await Auth.getSession();
  if (session) {
    const profile = await Auth.getProfile();
    redirectByRole(profile?.app_role);
  }
})();

function redirectByRole(role) {
  if (role === 'super_admin') window.location.href = '/pages/superadmin.html';
  else if (role === 'institution_admin') window.location.href = '/pages/admin.html';
  else window.location.href = '/pages/portal.html';
}

async function sendCode(resend = false) {
  const emailInput = document.getElementById('email');
  const email = resend ? currentEmail : emailInput.value.trim();
  const errEl = document.getElementById('email-error');
  const btn   = document.getElementById('send-btn');

  if (!email) return;
  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Enviando...';

  const { error } = await db.auth.signInWithOtp({ email, options: { shouldCreateUser: false } });

  if (error) {
    errEl.textContent = error.message;
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Enviar código';
    return;
  }

  currentEmail = email;
  document.getElementById('email-display').textContent = email;
  document.getElementById('step-email').style.display = 'none';
  document.getElementById('step-otp').style.display = '';
  document.querySelectorAll('.otp-input')[0].focus();

  if (resend) {
    document.getElementById('otp-error').textContent = '✅ Nuevo código enviado.';
    document.getElementById('otp-error').style.color = 'var(--color-success)';
    document.getElementById('otp-error').style.display = 'block';
    setTimeout(() => { document.getElementById('otp-error').style.display = 'none'; }, 3000);
  }

  btn.disabled = false;
  btn.textContent = 'Enviar código';
}

async function verifyCode() {
  const inputs = document.querySelectorAll('.otp-input');
  const token  = [...inputs].map(i => i.value).join('');
  const errEl  = document.getElementById('otp-error');
  const btn    = document.getElementById('verify-btn');

  if (token.length < 6) {
    errEl.textContent = 'Ingresa los 6 dígitos.';
    errEl.style.color = 'var(--color-danger)';
    errEl.style.display = 'block';
    return;
  }

  errEl.style.display = 'none';
  btn.disabled = true;
  btn.textContent = 'Verificando...';

  const { error } = await db.auth.verifyOtp({ email: currentEmail, token, type: 'email' });

  if (error) {
    errEl.textContent = 'Código incorrecto o expirado.';
    errEl.style.color = 'var(--color-danger)';
    errEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Verificar e ingresar';
    return;
  }

  const profile = await Auth.getProfile();
  redirectByRole(profile?.app_role);
}

function backToEmail() {
  document.getElementById('step-otp').style.display = 'none';
  document.getElementById('step-email').style.display = '';
  document.querySelectorAll('.otp-input').forEach(i => i.value = '');
}

// Navegación automática entre cajas OTP
document.addEventListener('DOMContentLoaded', () => {
  const inputs = document.querySelectorAll('.otp-input');
  inputs.forEach((input, i) => {
    input.addEventListener('input', () => {
      input.value = input.value.replace(/\D/g, '');
      if (input.value && i < inputs.length - 1) inputs[i + 1].focus();
      if ([...inputs].every(inp => inp.value)) verifyCode();
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !input.value && i > 0) inputs[i - 1].focus();
    });
    input.addEventListener('paste', (e) => {
      const paste = e.clipboardData.getData('text').replace(/\D/g, '').slice(0, 6);
      paste.split('').forEach((ch, idx) => { if (inputs[idx]) inputs[idx].value = ch; });
      if (paste.length === 6) verifyCode();
      e.preventDefault();
    });
  });

  document.getElementById('email').addEventListener('keydown', (e) => {
    if (e.key === 'Enter') sendCode();
  });
});
</script>
</body>
</html>
